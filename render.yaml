# render.yaml
services:
  - type: web
    name: tomato-ai-backend
    runtime: node
    repo: https://github.com/JayRdev09/Thesis-Backend
    plan: free
    region: oregon
    buildCommand: |
      # Remove existing Python and install Python 3.11 specifically
      apt-get update
      apt-get remove -y python3 python3-pip || true
      apt-get autoremove -y
      
      # Add deadsnakes repository for Python 3.11
      apt-get install -y software-properties-common
      add-apt-repository ppa:deadsnakes/ppa -y
      apt-get update
      
      # Install Python 3.11 and required packages
      apt-get install -y python3.11 python3.11-dev python3.11-venv python3.11-distutils build-essential libgl1-mesa-glx libglib2.0-0
      
      # Ensure python3 command points to python3.11
      update-alternatives --remove-all python3 || true
      update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 1
      update-alternatives --set python3 /usr/bin/python3.11
      
      # Install pip for Python 3.11
      curl -sS https://bootstrap.pypa.io/get-pip.py | python3.11
      
      # Verify Python version
      python3 --version
      
      # Install Node dependencies
      npm install
      
      # Create virtual environment with Python 3.11
      python3.11 -m venv venv
      . venv/bin/activate
      
      # Upgrade pip and install build tools first
      pip install --upgrade pip setuptools wheel
      
      # Install Python packages with specific versions known to work
      pip install numpy==1.24.3
      pip install pandas==2.0.3
      pip install scikit-learn==1.3.0
      pip install joblib==1.3.2
      pip install tensorflow==2.13.0
      pip install pillow==10.0.0
      pip install h5py==3.9.0
      pip install protobuf==3.20.3
      pip install opencv-python-headless==4.8.1.78
      
      # Make Python scripts executable
      chmod +x python_scripts/*.py
      
      # Verify installations
      python -c "import tensorflow as tf; print(f'TensorFlow version: {tf.__version__}')"
      pip list
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: PYTHON_PATH
        value: ./venv/bin/python
      - key: TF_ENABLE_ONEDNN_OPTS
        value: 0
      - key: PYTHONUNBUFFERED
        value: 1
    healthCheckPath: /health
    autoDeploy: true