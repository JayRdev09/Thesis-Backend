# render.yaml - Pure Node.js version (no Python)
services:
  - type: web
    name: tomato-ai-backend
    runtime: node
    repo: https://github.com/JayRdev09/Thesis-Backend
    plan: free
    region: oregon
    buildCommand: |
      # Install Node dependencies only
      npm install
      
      # No Python installation needed anymore!
      echo "✅ Building pure Node.js service"
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ML_SERVICE_URL
        value: https://tomato-ai-ml-service.onrender.com
      - key: TF_ENABLE_ONEDNN_OPTS
        value: 0
    healthCheckPath: /health
    autoDeploy: true
