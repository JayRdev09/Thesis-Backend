# render.yaml
services:
  - type: web
    name: tomato-ai-backend
    runtime: node
    repo: https://github.com/JayRdev09/Thesis-Backend
    plan: free
    region: oregon
    buildCommand: |
      # Install Python 3.11 specifically
      apt-get update
      apt-get install -y software-properties-common
      add-apt-repository ppa:deadsnakes/ppa -y
      apt-get update
      apt-get install -y python3.11 python3.11-dev python3.11-venv build-essential libgl1-mesa-glx libglib2.0-0
      
      # Create symlinks to make python3 point to python3.11
      update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 1
      update-alternatives --set python3 /usr/bin/python3.11
      
      # Install pip for Python 3.11
      curl -sS https://bootstrap.pypa.io/get-pip.py | python3.11
      
      # Install Node dependencies
      npm install
      
      # Create Python virtual environment with Python 3.11
      python3.11 -m venv venv
      . venv/bin/activate
      
      # Upgrade pip first
      pip install --upgrade pip setuptools wheel
      
      # Install Python packages
      pip install -r requirements.txt
      
      # Make Python scripts executable
      chmod +x python_scripts/*.py
      
      # Verify installations
      python --version
      pip list | grep -E "tensorflow|numpy|scikit-learn"
    startCommand: |
      . venv/bin/activate
      export PYTHONPATH=venv/lib/python3.11/site-packages:$PYTHONPATH
      node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: PYTHON_PATH
        value: ./venv/bin/python
      - key: TF_ENABLE_ONEDNN_OPTS
        value: 0
      - key: PYTHONUNBUFFERED
        value: 1
    healthCheckPath: /health
    autoDeploy: true