# render.yaml
services:
  - type: web
    name: tomato-ai-backend
    runtime: node
    repo: https://github.com/JayRdev09/Thesis-Backend
    plan: free
    region: oregon
    buildCommand: |
      # Install Python 3.11
      apt-get update
      apt-get install -y software-properties-common
      add-apt-repository ppa:deadsnakes/ppa -y
      apt-get update
      apt-get install -y python3.11 python3.11-dev python3.11-venv python3.11-distutils build-essential libgl1-mesa-glx libglib2.0-0
      
      # Make python3 point to python3.11
      update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 1
      update-alternatives --set python3 /usr/bin/python3.11
      
      # Install pip
      curl -sS https://bootstrap.pypa.io/get-pip.py | python3.11
      
      # Install Node dependencies
      npm install
      
      # Create virtual environment in a persistent location
      python3.11 -m venv /opt/render/python-env
      
      # Activate and install packages
      . /opt/render/python-env/bin/activate
      pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt
      
      # Make Python scripts executable
      chmod +x python_scripts/*.py
      
      # Create symlink to Python in venv for runtime
      ln -sf /opt/render/python-env/bin/python /opt/render/project/src/python3
      
      # Verify
      . /opt/render/python-env/bin/activate && python --version
      . /opt/render/python-env/bin/activate && pip list | grep tensorflow
    startCommand: |
      # Ensure Python environment is activated at runtime
      export PATH="/opt/render/python-env/bin:$PATH"
      export PYTHONPATH="/opt/render/python-env/lib/python3.11/site-packages:$PYTHONPATH"
      node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: PYTHON_PATH
        value: /opt/render/python-env/bin/python
      - key: TF_ENABLE_ONEDNN_OPTS
        value: 0
      - key: PYTHONUNBUFFERED
        value: 1
    healthCheckPath: /health
    autoDeploy: true