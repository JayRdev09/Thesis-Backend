# render.yaml
services:
  - type: web
    name: tomato-ai-backend
    runtime: node
    repo: https://github.com/JayRdev09/Thesis-Backend
    plan: free
    region: oregon
    buildCommand: |
      apt-get update
      apt-get install -y python3 python3-pip python3-venv build-essential libgl1-mesa-glx libglib2.0-0
      npm install
      python3 -m venv venv
      . venv/bin/activate
      pip install --upgrade pip
      pip install -r requirements.txt
      chmod +x python_scripts/*.py
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: PYTHON_PATH
        value: ./venv/bin/python
      - key: TF_ENABLE_ONEDNN_OPTS
        value: 0
      - key: PYTHONUNBUFFERED
        value: 1
    healthCheckPath: /health
    autoDeploy: true